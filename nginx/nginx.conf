events {}

http {
    upstream ai_backend {
        server ai-exporter:8000;
    }

    server {
        listen 8080;

        location / {
            proxy_pass         http://ai_backend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;

            proxy_read_timeout 300s;
            proxy_send_timeout 300s;

            proxy_buffering    off;
        }
    }
}
