apiVersion: 1

groups:
  - orgId: 1
    name: ai-inference-sla
    folder: AI Observability
    interval: 10s
    rules:
      - uid: ai-high-latency-p95
        title: AI High Latency p95
        condition: C
        for: 1m
        noDataState: NoData
        execErrState: Error
        annotations:
          summary: "AI inference p95 latency is above SLA"
          description: "p95 latency for /api/generate is above 2 seconds for at least 1 minute."
        isPaused: false
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              refId: A
              editorMode: code
              expr: |
                histogram_quantile(
                  0.95,
                  sum(rate(ai_request_duration_seconds_bucket{path="/api/generate"}[1m])) by (le)
                )
              instant: true
              range: false
              intervalMs: 1000
              maxDataPoints: 43200

          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last

          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              refId: C
              type: threshold
              expression: B
              conditions:
                - type: query
                  query:
                    params:
                      - C
                  reducer:
                    type: last
                    params: []
                  evaluator:
                    type: gt
                    params:
                      - 2
                  operator:
                    type: and
